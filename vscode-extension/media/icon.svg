<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- psychedelic gradient -->
    <linearGradient id="lsd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF00FF"/>
      <stop offset="33%" stop-color="#00FFFF"/>
      <stop offset="66%" stop-color="#FFFF00"/>
      <stop offset="100%" stop-color="#FF00FF"/>
    </linearGradient>
    <!-- eye swirl -->
    <radialGradient id="eyeL">
      <stop offset="0%" stop-color="#FF00FF"/>
      <stop offset="50%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#FFFF00"/>
    </radialGradient>
    <radialGradient id="eyeR">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="50%" stop-color="#FF00FF"/>
      <stop offset="100%" stop-color="#00FFFF"/>
    </radialGradient>
  </defs>
  <!-- outer glow ring -->
  <circle cx="12" cy="11" r="11" fill="none" stroke="url(#lsd)" stroke-width="0.8" opacity="0.4"/>
  <!-- antenna stalk -->
  <line x1="12" y1="0.5" x2="12" y2="4.5" stroke="url(#lsd)" stroke-width="1.6" stroke-linecap="round"/>
  <!-- antenna orb - pulsing -->
  <circle cx="12" cy="0.8" r="2" fill="#FF00FF" opacity="0.3"/>
  <circle cx="12" cy="0.8" r="1.2" fill="#FFFF00" opacity="0.5"/>
  <circle cx="12" cy="0.8" r="0.6" fill="#FFFFFF"/>
  <!-- head - groovy rounded shape -->
  <rect x="3" y="4.5" width="18" height="13.5" rx="5" fill="none" stroke="url(#lsd)" stroke-width="1.8"/>
  <!-- visor band - rainbow tint -->
  <rect x="5" y="8.5" width="14" height="6" rx="3" fill="url(#lsd)" opacity="0.1"/>
  <!-- left eye - hypnotic spiral rings -->
  <circle cx="8.5" cy="11.5" r="3" fill="none" stroke="#FF00FF" stroke-width="0.6" opacity="0.4"/>
  <circle cx="8.5" cy="11.5" r="2.3" fill="none" stroke="#00FFFF" stroke-width="1"/>
  <circle cx="8.5" cy="11.5" r="1.4" fill="none" stroke="#FFFF00" stroke-width="0.8"/>
  <circle cx="8.5" cy="11.5" r="0.7" fill="url(#eyeL)"/>
  <!-- right eye - hypnotic spiral rings -->
  <circle cx="15.5" cy="11.5" r="3" fill="none" stroke="#00FF88" stroke-width="0.6" opacity="0.4"/>
  <circle cx="15.5" cy="11.5" r="2.3" fill="none" stroke="#FF00FF" stroke-width="1"/>
  <circle cx="15.5" cy="11.5" r="1.4" fill="none" stroke="#00FFFF" stroke-width="0.8"/>
  <circle cx="15.5" cy="11.5" r="0.7" fill="url(#eyeR)"/>
  <!-- groovy teeth grin -->
  <path d="M8 15.8 Q12 19.5 16 15.8" stroke="#FFFF00" stroke-width="1" stroke-linecap="round" fill="none"/>
  <line x1="10" y1="16.6" x2="10" y2="17.4" stroke="#FFFF00" stroke-width="0.6"/>
  <line x1="12" y1="17.2" x2="12" y2="18" stroke="#FFFF00" stroke-width="0.6"/>
  <line x1="14" y1="16.6" x2="14" y2="17.4" stroke="#FFFF00" stroke-width="0.6"/>
  <!-- ear bolts - multicolor -->
  <circle cx="1.5" cy="11.5" r="1.5" fill="#00FFFF" opacity="0.6"/>
  <circle cx="22.5" cy="11.5" r="1.5" fill="#FF00FF" opacity="0.6"/>
  <!-- tiny body -->
  <rect x="8" y="19.5" width="8" height="3.8" rx="1.8" fill="none" stroke="url(#lsd)" stroke-width="1.2"/>
  <!-- peace sign on body -->
  <circle cx="12" cy="21.2" r="1.2" fill="none" stroke="#00FFFF" stroke-width="0.6"/>
  <line x1="12" y1="20" x2="12" y2="22.4" stroke="#00FFFF" stroke-width="0.5"/>
  <line x1="12" y1="21.2" x2="11" y2="22" stroke="#00FFFF" stroke-width="0.5"/>
  <line x1="12" y1="21.2" x2="13" y2="22" stroke="#00FFFF" stroke-width="0.5"/>
</svg>
